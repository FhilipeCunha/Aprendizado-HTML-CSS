<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixas</title>
    <style>
        *{
            margin: 0;
        }

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: row;
        }
        
        main{
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1{
            display: flex;
            color: black;
            font-weight: 400;
            font-size: 30px;
        }
        
        .box1{
            display: flex;
            background: gray;
            width: 300px;
            height: 200px;
            text-align: center;
            justify-content: center;
            align-items: center;
            border: 6px solid black;
            padding: 10px;
            outline: 6px solid blue;
            margin: 10px;
        }
        
        .box2{
            display: flex;
            background-color: gray;
            width: 300px;
            height: 200px;
            text-align: center;
            justify-content: center;
            align-items: center;
            border: 6px solid black;
            padding: 10px;
            margin: 10px;
            outline: 6px solid blue;
        }

        .box3{
            display: flex;
            background-color: gray;
            width: 300px;
            height: 200px;
            text-align: center;
            justify-content: center;
            align-items: center;
            border: 6px solid black ;
            padding: 10px;
            margin: 10px;
            outline: 6px solid blue;
        }
    </style>
</head>
<body><main>
    
            <p class="box1">Box-Level</p>
            <p class="box2">Box-Level</p>
            <p class="box3">Box-Level</p>
</main>
</body>
</html>
