<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            background-color: lightgray;
            width: 220px;
            height: 200px;
            border-radius: 10px;
            border: 10px solid rgba(128, 128, 128, 0.5);
        }

        a{
            border: 4px solid blueviolet;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Box-Level</h1>
    <p>Parágrafos também são exemplos de Box-Level, mas os <a href="#">Links são exemplos de Inline-Level</a>. Vamos ver como tudo isso funciona</p>
</body>
</html>
